name: Build Multi-Platform Natives
on: [push]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Windows Build
      - name: Compile Windows DLL
        if: matrix.os == 'windows-latest'
        run: |
          # Download the dev kit
          curl -L -o mpv-sdk.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260304/mpv-dev-x86_64-20260304-git-c401ef9.7z
          7z x mpv-sdk.7z -ompv-dev

          gcc -shared -o native_render.dll auraplayer-core/src/main/c/native_render.c `
            -Impv-dev/include `
            -I"${{ env.JAVA_HOME }}/include" `
            -I"${{ env.JAVA_HOME }}/include/win32" `
            -L"${{ env.JAVA_HOME }}/lib" `
            -ljawt `
            mpv-dev/libmpv.dll.a

          New-Item -ItemType Directory -Force -Path "auraplayer-core/src/main/resources/nativelibs/windows-x64"
          Move-Item -Force native_render.dll auraplayer-core/src/main/resources/nativelibs/windows-x64/
          Copy-Item -Force mpv-dev/libmpv-2.dll auraplayer-core/src/main/resources/nativelibs/windows-x64/

      # Linux Build
      - name: Compile Linux SO
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install the MPV development headers and library
          sudo apt-get update
          sudo apt-get install -y libmpv-dev
          gcc -fPIC -shared -o libnative_render.so auraplayer-core/src/main/c/native_render.c \
            -I"${{ env.JAVA_HOME }}/include" \
            -I"${{ env.JAVA_HOME }}/include/linux" \
            -L"${{ env.JAVA_HOME }}/lib" \
            -ljawt \
            -lmpv
          
          mkdir -p auraplayer-core/src/main/resources/nativelibs/linux-x64
          mv libnative_render.so auraplayer-core/src/main/resources/nativelibs/linux-x64/

      # MacOS Build
      - name: Compile MacOS Dylib
        if: matrix.os == 'macos-latest'
        run: |
          brew install mpv
          
          JAWT_PATH=$(find "${{ env.JAVA_HOME }}" -name "libjawt.dylib" -exec dirname {} \;)
          echo "JAWT directory found at: $JAWT_PATH"
          
          clang -dynamiclib -o libnative_render.dylib auraplayer-core/src/main/c/native_render.c \
            -I"${{ env.JAVA_HOME }}/include" \
            -I"${{ env.JAVA_HOME }}/include/darwin" \
            -L"$JAWT_PATH" \
            -L"${{ env.JAVA_HOME }}/lib" \
            -ljawt -lmpv \
            -framework AppKit \
            -framework QuartzCore \
            -framework Foundation \
            -arch arm64
          
          mkdir -p auraplayer-core/src/main/resources/nativelibs/macos-x64
          mv libnative_render.dylib auraplayer-core/src/main/resources/nativelibs/macos-x64/

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Fat JAR
        run: ./gradlew :auraplayer-core:jar

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AuraPlayer-Core-${{ matrix.platform }}
          path: auraplayer-core/build/libs/*.jar