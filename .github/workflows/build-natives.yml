name: Build Multi-Platform Natives and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ------------------------------------------------------------------
      # Windows Build
      # ------------------------------------------------------------------
      - name: Compile Windows DLL
        if: matrix.os == 'windows-latest'
        run: |
          curl -L -o mpv-sdk.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260304/mpv-dev-x86_64-20260304-git-c401ef9.7z
          7z x mpv-sdk.7z -ompv-dev

          gcc -shared -o native_render.dll `
            auraplayer-core/src/main/c/native_player.c `
            auraplayer-core/src/main/c/native_surface_win.c `
            -Impv-dev/include `
            -I"${{ env.JAVA_HOME }}/include" `
            -I"${{ env.JAVA_HOME }}/include/win32" `
            "${{ env.JAVA_HOME }}/lib/jawt.lib" `
            mpv-dev/libmpv.dll.a

          New-Item -ItemType Directory -Force -Path "auraplayer-core/src/main/resources/nativelibs/windows-x64"
          Move-Item -Force native_render.dll auraplayer-core/src/main/resources/nativelibs/windows-x64/
          Copy-Item -Force mpv-dev/libmpv-2.dll auraplayer-core/src/main/resources/nativelibs/windows-x64/

      # ------------------------------------------------------------------
      # Linux Build
      # ------------------------------------------------------------------
      - name: Compile Linux SO
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # FIX: libx11-dev is required by jawt_md.h on Linux
          sudo apt-get install -y libmpv-dev libx11-dev

          gcc -fPIC -shared -o libnative_render.so \
            auraplayer-core/src/main/c/native_player.c \
            auraplayer-core/src/main/c/native_surface_x11.c \
            -I"${{ env.JAVA_HOME }}/include" \
            -I"${{ env.JAVA_HOME }}/include/linux" \
            -L"${{ env.JAVA_HOME }}/lib" \
            -ljawt \
            -lmpv

          mkdir -p auraplayer-core/src/main/resources/nativelibs/linux-x64
          mv libnative_render.so auraplayer-core/src/main/resources/nativelibs/linux-x64/
        
          cp /usr/lib/x86_64-linux-gnu/libmpv.so.2 auraplayer-core/src/main/resources/nativelibs/linux-x64/

      # ------------------------------------------------------------------
      # macOS Build
      # ------------------------------------------------------------------
      - name: Compile MacOS Dylib
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p intel_jdk
          curl -L -o jdk_intel.tar.gz "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jdk_x64_mac_hotspot_21.0.2_13.tar.gz"
          tar -xzf jdk_intel.tar.gz -C intel_jdk --strip-components=1
          INTEL_JAVA_HOME="$(pwd)/intel_jdk/Contents/Home"

          NATIVE_DIR="auraplayer-core/src/main/resources/nativelibs/macos-x64"
          mkdir -p "$NATIVE_DIR"

          curl -L -o libmpv-macos.zip \
            "https://github.com/M0ssi-P/mpv-macbuild/releases/latest/download/libmpv-macos.zip"
          unzip -o libmpv-macos.zip -d mpv-package

          cp mpv-package/libmpv.dylib "$NATIVE_DIR/libmpv.dylib"
          lipo -archs "$NATIVE_DIR/libmpv.dylib"

          mkdir -p auraplayer-core/src/main/c/include
          cp -r mpv-package/include/mpv auraplayer-core/src/main/c/include/mpv
          MPV_INC="$(pwd)/auraplayer-core/src/main/c/include"
          SRC="auraplayer-core/src/main/c"

          # ---- x86_64 slice: portable core (C) + mac surface (ObjC/ARC) ----
          clang -c "$SRC/native_render.c" -o native_render_x86.o \
            -arch x86_64 -mmacosx-version-min=11.0 -fPIC \
            -I"$INTEL_JAVA_HOME/include" -I"$INTEL_JAVA_HOME/include/darwin" \
            -I"$MPV_INC"

          clang -c "$SRC/jawt_macos.m" -o jawt_macos_x86.o \
            -arch x86_64 -mmacosx-version-min=11.0 -fPIC -fobjc-arc \
            -I"$INTEL_JAVA_HOME/include" -I"$INTEL_JAVA_HOME/include/darwin" \
            -I"$MPV_INC"

          # ---- arm64 slice ----
          clang -c "$SRC/native_render.c" -o native_render_arm.o \
            -arch arm64 -mmacosx-version-min=11.0 -fPIC \
            -I"${{ env.JAVA_HOME }}/include" -I"${{ env.JAVA_HOME }}/include/darwin" \
            -I"$MPV_INC"

          clang -c "$SRC/jawt_macos.m" -o jawt_macos_arm.o \
            -arch arm64 -mmacosx-version-min=11.0 -fPIC -fobjc-arc \
            -I"${{ env.JAVA_HOME }}/include" -I"${{ env.JAVA_HOME }}/include/darwin" \
            -I"$MPV_INC"

          # FIX: dropped -framework OpenGL (nothing uses GL anymore).
          # FIX: -rpath @loader_path so the @rpath/libmpv.dylib reference
          #      resolves from the same directory the loader extracts to.
          clang -dynamiclib native_render_x86.o jawt_macos_x86.o \
            -o libnative_render_x86.dylib \
            -arch x86_64 \
            -L"$INTEL_JAVA_HOME/lib" -ljawt \
            -L"$NATIVE_DIR" -lmpv \
            -Wl,-rpath,@loader_path \
            -framework AppKit -framework QuartzCore -framework Foundation \
            -framework CoreGraphics

          clang -dynamiclib native_player_arm.o jawt_macos_arm.o \
            -o libnative_render_arm.dylib \
            -arch arm64 \
            -L"${{ env.JAVA_HOME }}/lib" -ljawt \
            -L"$NATIVE_DIR" -lmpv \
            -Wl,-rpath,@loader_path \
            -framework AppKit -framework QuartzCore -framework Foundation \
            -framework CoreGraphics

          lipo -create libnative_render_x86.dylib libnative_render_arm.dylib \
            -output "$NATIVE_DIR/libnative_render.dylib"

          xattr -cr "$NATIVE_DIR/libnative_render.dylib"
          codesign --force -s - "$NATIVE_DIR/libnative_render.dylib"

          echo "=== Final verification ==="
          otool -L "$NATIVE_DIR/libnative_render.dylib"
          lipo -archs "$NATIVE_DIR/libnative_render.dylib"

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Fat JAR
        run: ./gradlew :auraplayer-core:jar

      - name: Upload Native Binary to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: auraplayer-core/src/main/resources/nativelibs/

  publish:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download all natives
        uses: actions/download-artifact@v4
        with:
          path: auraplayer-core/src/main/resources/nativelibs/
          merge-multiple: true

      - name: Debug - List Resource Folder
        run: ls -R auraplayer-core/src/main/resources/nativelibs/

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Debug Secrets Presence
        run: |
          if [ -z "${{ secrets.GPG_SIGNING_KEY }}" ]; then
            echo "ERROR: GPG_SIGNING_KEY is empty!"
          else
            echo "SUCCESS: GPG_SIGNING_KEY is set."
          fi

      - name: Publish to Maven Central (Sonatype)
        run: ./gradlew publishAllPublicationsToMavenCentralRepository -Paura_version=${GITHUB_REF_NAME#v}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            auraplayer-core/build/libs/*.jar
            auraplayer-compose/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}