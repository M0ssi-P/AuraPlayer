jdk:
  - openjdk21

before_install:
  - echo "Skipping standard build. Fetching pre-built artifacts from GitHub Release..."

install:
  - curl -L "https://github.com/M0ssi-P/AuraPlayer/releases/download/${VERSION}/auraplayer-core-1.0-SNAPSHOT.jar" -o core.jar
  - curl -L "https://github.com/M0ssi-P/AuraPlayer/releases/download/${VERSION}/auraplayer-compose-1.0-SNAPSHOT.jar" -o compose.jar

  - ls -lh *.jar

  - mvn install:install-file -Dfile=core.jar -DgroupId=com.github.m0ssi-p.auraplayer -DartifactId=auraplayer-core -Dversion=${VERSION} -Dpackaging=jar
  - mvn install:install-file -Dfile=compose.jar -DgroupId=com.github.m0ssi-p.auraplayer -DartifactId=auraplayer-compose -Dversion=${VERSION} -Dpackaging=jar

build:
  - echo "Multi-module artifacts installed from release."